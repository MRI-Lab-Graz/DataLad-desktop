name: Build OS Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    name: macOS (x64 + arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts (Intel + Apple Silicon)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run package:mac:both -- --publish=never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datalad-desktop-macos
          path: |
            dist/*.dmg
            dist/*-mac.zip
            dist/latest-mac.yml
            dist/builder-debug.yml
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        run: npm run package:win:x64 -- --publish=never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datalad-desktop-windows-x64
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/builder-debug.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: datalad-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.blockmap
            release-assets/**/*.yml