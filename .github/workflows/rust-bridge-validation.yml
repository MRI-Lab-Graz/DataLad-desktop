name: Rust Bridge Validation

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Rust Adapter Path
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm test

      - name: Run Rust core tests
        run: npm run test:rust:core

      - name: Run Rust addon tests
        run: npm run test:rust:addon

      - name: Build Rust addon
        run: npm run build:rust:addon

      - name: Run bridge tests
        run: npm run test:bridge

      - name: Run adapter parity tests
        run: npm run test:parity
