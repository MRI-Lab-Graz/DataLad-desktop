name: Rust Bridge Validation

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Rust Adapter Path (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm test

      - name: Run Rust core tests
        run: npm run test:rust:core

      - name: Run Rust addon tests
        run: npm run test:rust:addon

      - name: Build Rust addon
        run: npm run build:rust:addon

      - name: Run bridge tests
        run: npm run test:bridge

      - name: Run adapter parity tests
        run: npm run test:parity

      - name: Write validation summary
        if: always()
        run: |
          echo "## Rust Bridge Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: ${{ matrix.os }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node tests: npm test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rust core: npm run test:rust:core" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rust addon: npm run test:rust:addon" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rust build: npm run build:rust:addon" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bridge tests: npm run test:bridge" >> "$GITHUB_STEP_SUMMARY"
          echo "- Parity tests: npm run test:parity" >> "$GITHUB_STEP_SUMMARY"
