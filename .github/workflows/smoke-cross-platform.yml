name: Smoke Cross Platform

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
        node:
          - '20'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit smoke tests
        run: npm test
