# Requires shell runners tagged `macos` and `windows` with Node.js 20+ on PATH.
# The release job also needs an untagged Docker-capable runner or GitLab shared runner.

workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - build
  - release

default:
  interruptible: true

build_macos:
  stage: build
  tags:
    - macos
  variables:
    CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  script:
    - node --version
    - npm --version
    - npm ci
    - npm run package:mac:both -- --publish=never
  artifacts:
    name: 'datalad-desktop-macos-$CI_COMMIT_REF_SLUG'
    paths:
      - dist/*.dmg
      - dist/*-mac.zip
      - dist/latest-mac.yml
      - dist/builder-debug.yml
    expire_in: 14 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$CI_PIPELINE_SOURCE == "web"'

build_windows:
  stage: build
  tags:
    - windows
  script:
    - node --version
    - npm --version
    - npm ci
    - npm run package:win:x64 -- --publish=never
  artifacts:
    name: 'datalad-desktop-windows-x64-$CI_COMMIT_REF_SLUG'
    paths:
      - dist/*.exe
      - dist/*.blockmap
      - dist/latest.yml
      - dist/builder-debug.yml
    expire_in: 14 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$CI_PIPELINE_SOURCE == "web"'

release_gitlab:
  stage: release
  tags:
    - macos
  needs:
    - build_macos
    - build_windows
  script:
    - export RELEASE_API="$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
    - export MACOS_ASSET_URL="$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build_macos"
    - export WINDOWS_ASSET_URL="$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build_windows"
    - |
      cat > release.json <<EOF
      {
        "name": "DataLad Desktop $CI_COMMIT_TAG",
        "tag_name": "$CI_COMMIT_TAG",
        "description": "Packaged macOS and Windows artifacts built by GitLab CI.",
        "assets": {
          "links": [
            {
              "name": "macOS artifact archive",
              "url": "$MACOS_ASSET_URL",
              "link_type": "other"
            },
            {
              "name": "Windows artifact archive",
              "url": "$WINDOWS_ASSET_URL",
              "link_type": "other"
            }
          ]
        }
      }
      EOF
    - export RELEASE_STATUS=$(curl --silent --output /tmp/release-check.json --write-out '%{http_code}' --header "JOB-TOKEN: $CI_JOB_TOKEN" "$RELEASE_API/$CI_COMMIT_TAG")
    - |
      if [ "$RELEASE_STATUS" = "200" ]; then
        curl --silent --show-error --fail \
          --request PUT \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --header "Content-Type: application/json" \
          --data @release.json \
          "$RELEASE_API/$CI_COMMIT_TAG"
      else
        curl --silent --show-error --fail \
          --request POST \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --header "Content-Type: application/json" \
          --data @release.json \
          "$RELEASE_API"
      fi
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'